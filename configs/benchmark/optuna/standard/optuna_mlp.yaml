hidden_dims:
  type: categorical
  choices:
    - "256,512,256"
    - "256,512,1024,512,256"
    - "256,512,1024,2048,1024,512,256"
    - "256,512,1024,2048,4096,2048,1024,512,256"

dropout:
  type: float
  min: 0.05
  max: 0.25
  step: 0.05

batch_size:
  type: categorical
  choices:
    - 512
    - 1024
    - 2048
    - 4096

lr:
  type: float
  min: 0.0001
  max: 0.003
  log: true

weight_decay:
  type: float
  min: 0.000001
  max: 0.001
  log: true

precision:
  type: fixed
  value: fp32

epochs:
  type: fixed
  value: 75

num_workers:
  type: fixed
  value: 6

val_fraction:
  type: fixed
  value: 0.1

early_stopping_patience:
  type: fixed
  value: 6

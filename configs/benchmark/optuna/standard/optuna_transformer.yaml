d_model:
  type: categorical
  choices:
    - 128
    - 256
    - 512
    - 1024

nhead:
  type: categorical
  choices:
    - 1
    - 2
    - 4
    - 8

num_layers:
  type: categorical
  choices:
    - 2
    - 3
    - 4
    - 5
    - 6

dim_feedforward:
  type: derived
  from: d_model
  op: multiply
  by: 4

dropout:
  type: float
  min: 0.05
  max: 0.35
  step: 0.05

batch_size:
  type: categorical
  choices:
    - 32
    - 64
    - 128
    - 256

lr:
  type: float
  min: 0.00005
  max: 0.005
  log: true

weight_decay:
  type: float
  min: 0.000001
  max: 0.0001
  log: true

precision:
  type: fixed
  value: bf16

epochs:
  type: fixed
  value: 75

num_workers:
  type: fixed
  value: 6

val_fraction:
  type: fixed
  value: 0.1

early_stopping_patience:
  type: fixed
  value: 6

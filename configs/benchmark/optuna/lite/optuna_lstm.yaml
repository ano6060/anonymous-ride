batch_size:
  type: categorical
  choices:
    - 512
    - 1024
    - 2048

lr:
  type: float
  min: 0.00005
  max: 0.002
  log: true

weight_decay:
  type: float
  min: 0.000001
  max: 0.0001
  log: true

hidden_dim:
  type: categorical
  choices:
    - 128
    - 256
    - 512

num_layers:
  type: categorical
  choices:
    - 1
    - 2
    - 3

dropout:
  type: float
  min: 0.05
  max: 0.25
  step: 0.05

static_hidden_dim:
  type: derived
  from: hidden_dim
  op: identity

static_out_dim:
  type: derived
  from: hidden_dim
  op: floor_divide
  by: 2

head_hidden_dim:
  type: derived
  from: hidden_dim
  op: identity

precision:
  type: fixed
  value: fp32

epochs:
  type: fixed
  value: 75

num_workers:
  type: fixed
  value: 6

val_fraction:
  type: fixed
  value: 0.1

early_stopping_patience:
  type: fixed
  value: 6

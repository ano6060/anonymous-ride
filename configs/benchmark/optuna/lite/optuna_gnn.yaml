batch_size:
  type: categorical
  choices:
    - 16
    - 32
    - 64

lr:
  type: float
  min: 0.00005
  max: 0.002
  log: true

weight_decay:
  type: float
  min: 0.000001
  max: 0.0001
  log: true

hidden_dim:
  type: categorical
  choices:
    - 64
    - 128
    - 256

num_layers:
  type: categorical
  choices:
    - 2
    - 3
    - 4
    - 5
    - 6

hetero_aggr:
  type: categorical
  choices:
    - sum
    - mean

use_layer_norm:
  type: categorical
  choices:
    - true
    - false

gnn_dropout:
  type: categorical
  choices:
    - 0.0
    - 0.01
    - 0.05
    - 0.1
    - 0.15

head_dropout:
  type: categorical
  choices:
    - 0.0
    - 0.01
    - 0.05
    - 0.1
    - 0.15

edge_head_hidden_dim:
  type: categorical
  choices:
    - 128
    - 256
    - 512

precision:
  type: fixed
  value: fp32

epochs:
  type: fixed
  value: 75

num_workers:
  type: fixed
  value: 6

val_fraction:
  type: fixed
  value: 0.1

early_stopping_patience:
  type: fixed
  value: 6
